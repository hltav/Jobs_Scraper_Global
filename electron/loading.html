<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <!--
    Strict CSP: no inline scripts, no external resources.
    All styling is inline CSS only (allowed by 'unsafe-inline' for style-src).
  -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'unsafe-inline'" />
  <title>Vagas Full – Carregando</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #0f172a;          /* slate-900 */
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      color: #f1f5f9;               /* slate-100 */
      user-select: none;
      -webkit-app-region: drag;     /* makes frameless window draggable */
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 40px 48px;
      background: #1e293b;          /* slate-800 */
      border: 1px solid #334155;    /* slate-700 */
      border-radius: 16px;
      width: 420px;
      text-align: center;
    }

    .logo {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #38bdf8;               /* sky-400 */
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid #334155;
      border-top-color: #38bdf8;    /* sky-400 */
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      font-size: 16px;
      font-weight: 600;
      color: #e2e8f0;               /* slate-200 */
    }

    .hint {
      font-size: 13px;
      color: #64748b;               /* slate-500 */
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Vagas Full</div>
    <div class="spinner"></div>
    <p class="status">Buscando vagas no LinkedIn...</p>
    <p class="hint">Isso pode levar alguns instantes.<br>Aguarde enquanto os dados são coletados.</p>
  </div>
</body>
</html>
