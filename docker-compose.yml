services:
  scraper-go:
    build:
      context: ./scraper-go
      dockerfile: Dockerfile
    container_name: vagas-scraper-go
    env_file:
      - ./.env
    volumes:
      - ./.env:/app/.env:ro
    environment:
      - GO_SCRAPER_ADDR=:8081
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - vagas-net
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: vagas-backend
    env_file:
      - ./backend/.env
    environment:
      - PORT=3001
      - GO_SCRAPER_URL=http://scraper-go:8081
      - KEYWORDS_STORAGE_MODE=${KEYWORDS_STORAGE_MODE:-env}
      - CACHE_TTL_MS=${CACHE_TTL_MS:-600000}
      - REDIS_KEY_PREFIX=${REDIS_KEY_PREFIX:-vagas-full}
    volumes:
      - ./backend/output:/app/output
    ports:
      - "3001:3001"
    depends_on:
      scraper-go:
        condition: service_healthy
    networks:
      - vagas-net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: vagas-frontend
    command: npm run dev --workspace=frontend -- --host 0.0.0.0
    environment:
      - VITE_API_PROXY_TARGET=http://backend:3001
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - vagas-net
    restart: unless-stopped

networks:
  vagas-net:
    external: true