services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vagas-backend
    command: ["node", "src/server.js"]
    env_file:
      - ./backend/.env
    environment:
      - PORT=3001
    volumes:
      - ./backend/output:/app/output
    ports:
      - "3001:3001"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vagas-frontend
    environment:
      - VITE_API_PROXY_TARGET=http://backend:3001
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
